steps:
# 1) Unit tests (fast feedback), a red test MUST fail the build
  - name: 'python:3.12-slim'
    entrypoint: 'bash'
    args: ['-c', 'pip install -r requirements.txt && pip install pytest && pytest -q']
# 2) Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build','-t',
      '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/ship-it:$SHORT_SHA', '.']
# 3) Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/ship-it:$SHORT_SHA']
  # 4) Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args: ['run','deploy','ship-it',
          '--image','${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/ship-it:$SHORT_SHA',
          '--region','${_REGION}','--allow-unauthenticated']
substitutions:
  _REGION: 'us-central1'
  _REPO: 'labs'
options:
  logging: CLOUD_LOGGING_ONLY